plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.140'
}

version = mod_version
group = mod_group_id

base {
    archivesName = 'PasterDreamAPI'
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // 为 test sourceSet 添加 Minecraft / NeoForge 编译依赖，
    // 使迁移到 src/test/java 的 dimension/example/ 示例类能够编译
    addModdingDependenciesTo(sourceSets.test)
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

// test sourceSet 中存放的是示例/工具类，没有 JUnit 测试，
// 关闭“未发现测试即失败”的校验，避免 build 任务中断
tasks.named('test', Test).configure {
    failOnNoDiscoveredTests = false
}

repositories {
    flatDir {
        dirs rootProject.file('libs')
    }
}

dependencies {
    compileOnly files(rootProject.file('libs/curios-neoforge-9.5.1+1.21.1.jar'))
    compileOnly files(rootProject.file('libs/geckolib-neoforge-1.21.1-4.8.4.jar'))
}
